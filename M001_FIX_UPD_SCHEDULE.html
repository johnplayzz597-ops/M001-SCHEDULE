<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LFAU133M001 SCHEDULE | FIX & UPDATE · PROJECT TACHYON ©2025</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            transition: background-color 0.25s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s;
        }

        :root {
            --bg-gradient-start: #f0f7ff;
            --bg-gradient-end: #e9f0fa;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --header-bg: #1e3a8a;
            --header-text: white;
            --subject-border: #3b82f6;
            --subject-bg: #f8fafc;
            --time-bg: #eef2ff;
            --badge-bg: #e2e8f0;
            --shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.1);
            --highlight-border: #facc15;
            --active-class-glow: rgba(59,130,246,0.2);
            --footer-text: #4b5563;
            --teacher-color: #475569;
        }

        body.dark {
            --bg-gradient-start: #0b1120;
            --bg-gradient-end: #111827;
            --card-bg: #1f2937;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --header-bg: #0f2b5c;
            --header-text: #f0f9ff;
            --subject-border: #60a5fa;
            --subject-bg: #111827;
            --time-bg: #1e293b;
            --badge-bg: #2d3a5e;
            --shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.5);
            --highlight-border: #fbbf24;
            --active-class-glow: rgba(96,165,250,0.25);
            --footer-text: #9ca3af;
            --teacher-color: #94a3b8;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 1.5rem;
        }

        .app-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 0.8rem 1.8rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.4);
        }
        body.dark .top-bar {
            background: rgba(15, 25, 45, 0.85);
            border-color: rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }
        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .theme-toggle {
            background: var(--card-bg);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .set-buttons {
            display: flex;
            gap: 0.8rem;
            background: var(--badge-bg);
            padding: 0.3rem;
            border-radius: 60px;
        }
        .set-btn {
            font-size: 1rem;
            font-weight: 700;
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            background: transparent;
            color: var(--text-primary);
            transition: 0.2s;
        }
        .set-btn.active {
            background: #1e3a8a;
            color: white;
        }
        body.dark .set-btn.active {
            background: #2563eb;
        }

        .live-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .clock-card, .next-class-card {
            background: var(--card-bg);
            border-radius: 1.8rem;
            padding: 1rem 1.8rem;
            flex: 1;
            min-width: 200px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .clock-title, .next-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }
        .ph-time {
            font-size: 2.4rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: var(--text-primary);
            letter-spacing: 2px;
        }
        .next-class-name {
            font-weight: 700;
            font-size: 1rem;
            margin-top: 8px;
        }
        .teacher-name {
            font-size: 0.7rem;
            color: var(--teacher-color);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }
        .day-card {
            background: var(--card-bg);
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.25s ease, box-shadow 0.2s;
            border: 1px solid rgba(203, 213, 225, 0.3);
        }
        .day-card:hover { transform: translateY(-4px); }
        .day-header {
            background: var(--header-bg);
            padding: 0.9rem 1.5rem;
            color: var(--header-text);
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 1.3rem;
            font-weight: 700;
        }
        .subject-list { padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        .subject-item {
            background: var(--subject-bg);
            border-radius: 1.3rem;
            padding: 0.9rem;
            border-left: 4px solid var(--subject-border);
            transition: all 0.2s;
            position: relative;
        }
        .subject-item.active-now {
            background: var(--active-class-glow);
            box-shadow: 0 0 0 2px var(--subject-border);
            border-left: 4px solid #facc15;
        }
        .subject-name {
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }
        .time-slot {
            font-size: 0.8rem;
            background: var(--time-bg);
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            margin: 4px 4px 0 0;
            color: var(--text-secondary);
        }
        .zoom-btn {
            background: #0f5b9c;
            border: none;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .zoom-btn:hover {
            background: #0e4a7c;
            transform: scale(1.02);
        }
        .meeting-id {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }
        .no-class { text-align: center; padding: 1.5rem; color: var(--text-secondary); }
        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.7rem;
            color: var(--footer-text);
        }
        .current-day-highlight {
            border: 2px solid var(--highlight-border);
        }
        .live-now-badge {
            background: #22c55e;
            color: white;
            font-size: 0.65rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin-left: 8px;
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        @media (max-width: 720px) {
            body { padding: 1rem; }
            .ph-time { font-size: 1.5rem; }
            .schedule-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <h1><i class="fas fa-chalkboard-user"></i> LFAU133M001 · SCHEDULE 🐱</h1>
        <div class="header-actions">
            <div class="set-buttons">
                <button class="set-btn" data-set="A">SET A</button>
                <button class="set-btn" data-set="B">SET B</button>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Dark mode"><i class="fas fa-moon"></i></button>
        </div>
    </div>

    <div class="live-panel">
        <div class="clock-card">
            <div class="clock-title"><i class="fas fa-globe-asia"></i> PHILIPPINES · MANILA TIME</div>
            <div class="ph-time" id="liveClock">--:--:-- --</div>
        </div>
        <div class="next-class-card">
            <div class="next-title"><i class="fas fa-calendar-day"></i> TODAY'S SCHEDULE</div>
            <div id="nextClassInfo" class="next-class-name">Loading schedule...</div>
        </div>
    </div>

    <div id="scheduleContainer" class="schedule-grid"></div>
    <footer><i class="fas fa-tachometer-alt"></i> VILLANUEVA, MAR LESTER B · PROJECT TACHYON ©2025 </footer>
</div>

<script>
    const zoomOlss = {
        url: "https://us05web.zoom.us/j/9220677868?pwd=SnNORENRQ1MveVZDZzhURkpGbHA2Zz09",
        id: "922 067 7868",
        pass: "#COED4228"
    };
    const zoomOlfil = {
        url: "https://us04web.zoom.us/j/77917522803?pwd=FYuasMyi8W6iKhybE2OpcLrbMhKiAr.1",
        id: "779 1752 2803",
        pass: "#COED4228"
    };
    const zoomOlval = {
        url: "https://us04web.zoom.us/j/8685486181?pwd=DOlGaldVP5IePfT9LYdSRqR3MFIz8g.1&omn=75760840372",
        id: "868 548 6181",
        pass: "#COEDT4228"
    };

    const teachers = {
        "OLCC02": "MR. DONGCOY",
        "OLIMFBDS": "JORIZ, CHIONG",
        "OLPHYE003": "CEDO, JAMES",
        "OLSS02": "MS. CORNELIO, LEONALYN",
        "OLFIL02": "MS. BAUTISTA, JENNY",
        "OLVAL02": "QUIRANTE, VLADIMIR",
        "OLSS01": "MS. CORNELIO, LEONALYN"
    };

    function format12Hour(time24) {
        let [hour, minute] = time24.split(':').map(Number);
        const ampm = hour >= 12 ? 'PM' : 'AM';
        let hour12 = hour % 12;
        if (hour12 === 0) hour12 = 12;
        return `${hour12}:${minute.toString().padStart(2,'0')} ${ampm}`;
    }

    function convertSlotTo12hr(slotRaw) {
        let parts = slotRaw.split(' ');
        let timeRange = parts[0];
        let suffix = parts.slice(1).join(' ');
        let [start24, end24] = timeRange.split('-');
        if (!end24) return slotRaw;
        let start12 = format12Hour(start24.trim());
        let end12 = format12Hour(end24.trim());
        let result = `${start12} - ${end12}`;
        if (suffix) result += ` ${suffix}`;
        return result;
    }

    function makeSubject(name, slots24, zoom = null, icon = null) {
        const iconMap = {
            "OLCC02": "fas fa-laptop-code",
            "OLIMFBDS": "fas fa-database",
            "OLPHYE003": "fas fa-dumbbell",
            "OLSS02": "fas fa-globe",
            "OLFIL02": "fas fa-language",
            "OLVAL02": "fas fa-hand-sparkles",
            "OLSS01": "fas fa-globe"
        };
        const finalIcon = icon || iconMap[name] || "fas fa-book";
        const slotsDisplay = slots24.map(s => convertSlotTo12hr(s));
        return {
            name: name,
            icon: finalIcon,
            slotsRaw24: slots24,
            slotsDisplay: slotsDisplay,
            zoom: zoom,
            teacher: teachers[name] || "Faculty"
        };
    }

    const setASchedule = {
        Monday: { type: "FTF", subjects: [ makeSubject("OLCC02", ["07:30 - 08:00 LEC", "13:30 - 15:00 LAB"]), makeSubject("OLPHYE003", ["11:00 - 13:00 GYM"]) ] },
        Tuesday: { type: "OC", subjects: [ makeSubject("OLSS02", ["07:30 - 09:00 LEC"], zoomOlss), makeSubject("OLFIL02", ["09:00 - 10:30"], zoomOlfil) ] },
        Wednesday: { type: "FTF/OC", subjects: [ makeSubject("OLIMFBDS", ["06:00 - 07:30 LEC", "09:00 - 10:30 LAB"]), makeSubject("OLVAL02", ["13:30 - 15:00 LEC"], zoomOlval) ] },
        Thursday: { type: "NO CLASS", subjects: null, noClass: true },
        Friday: { type: "OC", subjects: [ makeSubject("OLSS01", ["07:30 - 09:00"], zoomOlss), makeSubject("OLFIL02", ["09:00 - 10:30"], zoomOlfil) ] },
        Saturday: { type: "OC", subjects: [ makeSubject("OLVAL02", ["13:30 - 15:00"], zoomOlval) ] }
    };

    const setBSchedule = {
        Monday: { type: "FTF", subjects: [ makeSubject("OLPHYE003", ["11:00 - 13:00 GYM"]) ] },
        Tuesday: { type: "OC", subjects: [ makeSubject("OLSS02", ["07:30 - 09:00 LEC"], zoomOlss), makeSubject("OLFIL02", ["09:00 - 10:30"], zoomOlfil) ] },
        Wednesday: { type: "OC", subjects: [ makeSubject("OLVAL02", ["13:30 - 15:00"], zoomOlval) ] },
        Thursday: { type: "FTF", subjects: [ makeSubject("OLCC02", ["07:30 - 08:00 LEC", "13:30 - 15:00 LAB"]) ] },
        Friday: { type: "OC", subjects: [ makeSubject("OLSS01", ["07:30 - 09:00"], zoomOlss), makeSubject("OLFIL02", ["09:00 - 10:30"], zoomOlfil) ] },
        Saturday: { type: "FTF/OC", subjects: [ makeSubject("OLIMFBDS", ["06:00 - 07:30 LEC", "09:00 - 10:30 LAB"]), makeSubject("OLVAL02", ["13:30 - 15:00"], zoomOlval) ] }
    };

    let currentSet = "A";
    const dayOrder = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    function getCurrentSchedule() { return currentSet === "A" ? setASchedule : setBSchedule; }

    function parseTimeToMinutes(time24) {
        let [hh, mm] = time24.split(':').map(Number);
        if (isNaN(hh) || isNaN(mm)) return 0;
        return hh * 60 + mm;
    }

    function getPhilippineTime() {
        const now = new Date();
        const phtOffset = 8 * 60;
        const localOffset = now.getTimezoneOffset();
        const utc = now.getTime() + (localOffset * 60000);
        return new Date(utc + (phtOffset * 60000));
    }

    function getAllClassSlotsForDay(dayData) {
        if (!dayData || !dayData.subjects || !Array.isArray(dayData.subjects)) return [];
        const slots = [];
        for (const sub of dayData.subjects) {
            if (sub.slotsRaw24 && Array.isArray(sub.slotsRaw24)) {
                sub.slotsRaw24.forEach((slotRaw, idx) => {
                    const match = slotRaw.match(/(\d{2}:\d{2})\s*-\s*(\d{2}:\d{2})/);
                    if (!match) {
                        console.warn(`Could not parse time from: ${slotRaw}`);
                        return;
                    }
                    
                    const startStr = match[1];
                    const endStr = match[2];
                    
                    const startMin = parseTimeToMinutes(startStr.trim());
                    const endMin = parseTimeToMinutes(endStr.trim());
                    
                    if (!isNaN(startMin) && !isNaN(endMin)) {
                        slots.push({
                            subject: sub.name,
                            icon: sub.icon,
                            start: startMin,
                            end: endMin,
                            rawSlot24: slotRaw,
                            displaySlot: sub.slotsDisplay && sub.slotsDisplay[idx] ? sub.slotsDisplay[idx] : convertSlotTo12hr(slotRaw),
                            zoom: sub.zoom,
                            teacher: sub.teacher,
                        });
                    }
                });
            }
        }
        return slots;
    }

    function getTodaySchedule() {
        const phTime = getPhilippineTime();
        const dayIndex = phTime.getDay();
        
        if (dayIndex === 0) return null;
        
        const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const dayName = dayNames[dayIndex];
        
        const schedule = getCurrentSchedule();
        
        if (!schedule.hasOwnProperty(dayName)) return null;
        
        const dayData = schedule[dayName];
        
        if (!dayData || dayData.noClass || !dayData.subjects || dayData.subjects.length === 0) {
            return null;
        }
        
        const slots = getAllClassSlotsForDay(dayData);
        const currentMinutes = phTime.getHours() * 60 + phTime.getMinutes();
        
        return slots.map(slot => ({
            ...slot,
            isActive: currentMinutes >= slot.start && currentMinutes < slot.end,
            isUpcoming: slot.start > currentMinutes,
            isPast: slot.end <= currentMinutes
        }));
    }

    function getCurrentActiveClass() {
        const phTime = getPhilippineTime();
        const currentMinutes = phTime.getHours() * 60 + phTime.getMinutes();
        const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const dayName = dayNames[phTime.getDay()];
        
        if (dayName === "Sunday") return null;
        
        const schedule = getCurrentSchedule();
        if (!schedule.hasOwnProperty(dayName)) return null;
        
        const dayData = schedule[dayName];
        if (!dayData || dayData.noClass || !dayData.subjects) return null;
        
        const slots = getAllClassSlotsForDay(dayData);
        for (let slot of slots) {
            if (currentMinutes >= slot.start && currentMinutes < slot.end) {
                return { ...slot, dayName };
            }
        }
        return null;
    }

    function updateRealtimeUI() {
        const phTime = getPhilippineTime();
        
        const timeString = phTime.toLocaleTimeString('en-US', {
            hour: 'numeric',
            minute: '2-digit',
            second: '2-digit',
            hour12: true
        });
        
        document.getElementById('liveClock').innerHTML = `${timeString} <span style="font-size:1rem;">🇵🇭</span>`;

        const todaySchedule = getTodaySchedule();
        const nextInfoDiv = document.getElementById('nextClassInfo');
        
        if (!todaySchedule || todaySchedule.length === 0) {
            nextInfoDiv.innerHTML = '<div style="color: var(--text-secondary);"><i class="fas fa-coffee"></i> No classes scheduled for today. Enjoy your day!</div>';
            highlightActiveClassInDOM();
            return;
        }
        
        const activeClass = todaySchedule.find(s => s.isActive);
        
        if (activeClass) {
            nextInfoDiv.innerHTML = `
                <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;">
                    <i class="${activeClass.icon}" style="font-size: 1.2rem;"></i>
                    <strong style="font-size: 1rem;">${activeClass.subject}</strong>
                    <span class="live-now-badge">● LIVE NOW</span>
                </div>
                <div style="font-size: 0.85rem;">${activeClass.displaySlot}</div>
                <div class="teacher-name"><i class="fas fa-chalkboard-user"></i> ${activeClass.teacher}</div>
            `;
        } else {
            const upcomingClass = todaySchedule.find(s => s.isUpcoming);
            if (upcomingClass) {
                nextInfoDiv.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;">
                        <i class="${upcomingClass.icon}" style="font-size: 1.2rem;"></i>
                        <strong style="font-size: 1rem;">${upcomingClass.subject}</strong>
                        <span style="font-size: 0.7rem; background: var(--badge-bg); padding: 0.2rem 0.6rem; border-radius: 20px;">Up Next</span>
                    </div>
                    <div style="font-size: 0.85rem;">Starts at ${upcomingClass.displaySlot.split(' - ')[0]}</div>
                    <div class="teacher-name"><i class="fas fa-chalkboard-user"></i> ${upcomingClass.teacher}</div>
                `;
            } else {
                nextInfoDiv.innerHTML = '<div style="color: var(--text-secondary);"><i class="fas fa-check-circle"></i> All classes for today are finished! Great job! 🎉</div>';
            }
        }
        
        highlightActiveClassInDOM();
    }

    function highlightActiveClassInDOM() {
        const active = getCurrentActiveClass();
        document.querySelectorAll('.subject-item').forEach(el => el.classList.remove('active-now'));
        if (!active) return;
        
        document.querySelectorAll('.subject-item').forEach(el => {
            const subjName = el.getAttribute('data-subject');
            const slotDisplay = el.getAttribute('data-slot');
            if (subjName === active.subject && slotDisplay === active.displaySlot) {
                el.classList.add('active-now');
            }
        });
    }

    function renderSchedule() {
        const schedule = getCurrentSchedule();
        const container = document.getElementById('scheduleContainer');
        let html = '';
        
        for (let day of dayOrder) {
            const dayData = schedule[day];
            if (!dayData || dayData.noClass) {
                html += `<div class="day-card" data-day="${day}"><div class="day-header"><i class="fas fa-calendar-day"></i> ${day}</div><div class="subject-list"><div class="no-class"><i class="fas fa-bed"></i> No classes · Relax</div></div></div>`;
                continue;
            }
            
            const subjectsHtml = (dayData.subjects || []).map(sub => {
                const slotsHtml = sub.slotsDisplay.map(slot => `<div class="time-slot"><i class="far fa-clock"></i> ${slot}</div>`).join('');
                let zoomHtml = '';
                if (sub.zoom) {
                    zoomHtml = `<button class="zoom-btn" onclick="window.open('${sub.zoom.url}','_blank')"><i class="fas fa-video"></i> Join Zoom</button>
                                <div class="meeting-id"><i class="fas fa-key"></i> ID: ${sub.zoom.id} | ${sub.zoom.pass}</div>`;
                }
                const teacherHtml = `<div class="teacher-name"><i class="fas fa-chalkboard-user"></i> ${sub.teacher}</div>`;
                const slotIdentifier = sub.slotsDisplay[0] || "";
                return `<div class="subject-item" data-subject="${sub.name}" data-slot="${slotIdentifier}">
                            <div class="subject-name"><i class="${sub.icon}"></i> ${sub.name}</div>
                            ${teacherHtml}
                            <div class="lecture-lab">${slotsHtml}</div>
                            ${zoomHtml}
                        </div>`;
            }).join('');
            
            html += `<div class="day-card" data-day="${day}">
                        <div class="day-header"><i class="fas fa-calendar-week"></i> ${day} <span style="font-size:0.7rem; background:#ffffff40; padding:0.1rem 0.7rem; border-radius:20px;">${dayData.type}</span></div>
                        <div class="subject-list">${subjectsHtml || '<div class="no-class">—</div>'}</div>
                    </div>`;
        }
        
        container.innerHTML = html;
        highlightCurrentDayBorder();
        highlightActiveClassInDOM();
    }

    function highlightCurrentDayBorder() {
        const phTime = getPhilippineTime();
        const dayMap = {1:"Monday",2:"Tuesday",3:"Wednesday",4:"Thursday",5:"Friday",6:"Saturday"};
        const today = dayMap[phTime.getDay()];
        if(!today) return;
        document.querySelectorAll('.day-card').forEach(card => {
            if(card.getAttribute('data-day') === today) card.classList.add('current-day-highlight');
            else card.classList.remove('current-day-highlight');
        });
    }

    function setActiveSet(selected) {
        currentSet = selected;
        document.querySelectorAll('.set-btn').forEach(btn => {
            if(btn.getAttribute('data-set') === selected) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        renderSchedule();
        localStorage.setItem('tachyon_set', selected);
        updateRealtimeUI();
    }

    function initTheme() {
        const saved = localStorage.getItem('tachyon_theme');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            document.querySelector('#themeToggle i').className = 'fas fa-sun';
        } else {
            document.body.classList.remove('dark');
            document.querySelector('#themeToggle i').className = 'fas fa-moon';
        }
    }
    
    document.getElementById('themeToggle').addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('tachyon_theme', isDark ? 'dark' : 'light');
        const icon = document.querySelector('#themeToggle i');
        if (isDark) icon.className = 'fas fa-sun';
        else icon.className = 'fas fa-moon';
    });

    document.querySelectorAll('.set-btn').forEach(btn => {
        btn.addEventListener('click', () => setActiveSet(btn.getAttribute('data-set')));
    });

    const savedSetPref = localStorage.getItem('tachyon_set');
    if (savedSetPref === 'A' || savedSetPref === 'B') setActiveSet(savedSetPref);
    else setActiveSet('A');

    initTheme();
    renderSchedule();
    updateRealtimeUI();
    setInterval(() => updateRealtimeUI(), 1000);
    window.addEventListener('focus', () => { updateRealtimeUI(); });

    // ============================================
    // TACHYON FEATURE: Auto Rejoin Current Class (Ask First)
    // Version 1.0
    // ============================================
    
    (function() {
        'use strict';
        
        let popupShown = false;
        
        const injectPopupStyles = () => {
            const style = document.createElement('style');
            style.textContent = `
                .tachyon-popup-overlay {
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0, 0, 0, 0.6);
                    backdrop-filter: blur(8px);
                    z-index: 10000;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    opacity: 0;
                    visibility: hidden;
                    transition: opacity 0.3s ease, visibility 0.3s ease;
                    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
                }
                
                .tachyon-popup-overlay.active {
                    opacity: 1;
                    visibility: visible;
                }
                
                .tachyon-popup-card {
                    background: var(--card-bg, #ffffff);
                    border-radius: 2rem;
                    max-width: 450px;
                    width: 90%;
                    margin: 1rem;
                    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
                    transform: scale(0.9) translateY(20px);
                    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
                    overflow: hidden;
                }
                
                .tachyon-popup-overlay.active .tachyon-popup-card {
                    transform: scale(1) translateY(0);
                }
                
                .tachyon-popup-header {
                    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
                    padding: 1.5rem;
                    text-align: center;
                    color: white;
                }
                
                body.dark .tachyon-popup-header {
                    background: linear-gradient(135deg, #0f2b5c 0%, #1e40af 100%);
                }
                
                .tachyon-popup-header i {
                    font-size: 3rem;
                    margin-bottom: 0.5rem;
                    display: inline-block;
                }
                
                .tachyon-popup-header h2 {
                    font-size: 1.5rem;
                    margin: 0.5rem 0 0;
                    font-weight: 700;
                }
                
                .tachyon-popup-header p {
                    font-size: 0.85rem;
                    opacity: 0.9;
                    margin-top: 0.5rem;
                }
                
                .tachyon-popup-body {
                    padding: 1.5rem;
                }
                
                .class-details {
                    background: var(--subject-bg, #f8fafc);
                    border-radius: 1.2rem;
                    padding: 1rem;
                    margin-bottom: 1rem;
                }
                
                body.dark .class-details {
                    background: var(--subject-bg, #111827);
                }
                
                .detail-row {
                    display: flex;
                    align-items: center;
                    gap: 0.75rem;
                    padding: 0.6rem 0;
                    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
                }
                
                body.dark .detail-row {
                    border-bottom-color: rgba(255, 255, 255, 0.08);
                }
                
                .detail-row:last-child {
                    border-bottom: none;
                }
                
                .detail-icon {
                    width: 32px;
                    text-align: center;
                    color: var(--subject-border, #3b82f6);
                    font-size: 1.1rem;
                }
                
                .detail-content {
                    flex: 1;
                }
                
                .detail-label {
                    font-size: 0.7rem;
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                    color: var(--text-secondary, #334155);
                    margin-bottom: 0.2rem;
                }
                
                .detail-value {
                    font-weight: 700;
                    color: var(--text-primary, #0f172a);
                }
                
                .live-badge {
                    display: inline-block;
                    background: #22c55e;
                    color: white;
                    font-size: 0.7rem;
                    padding: 0.2rem 0.6rem;
                    border-radius: 20px;
                    font-weight: 600;
                    animation: tachyonPulse 1.5s infinite;
                    margin-left: 0.5rem;
                }
                
                @keyframes tachyonPulse {
                    0%, 100% { opacity: 1; }
                    50% { opacity: 0.7; }
                }
                
                .tachyon-popup-buttons {
                    display: flex;
                    gap: 1rem;
                    margin-top: 1rem;
                }
                
                .tachyon-btn {
                    flex: 1;
                    padding: 0.85rem 1rem;
                    border: none;
                    border-radius: 1rem;
                    font-weight: 700;
                    font-size: 0.95rem;
                    cursor: pointer;
                    transition: all 0.2s ease;
                    font-family: inherit;
                }
                
                .tachyon-btn-join {
                    background: #2563eb;
                    color: white;
                }
                
                .tachyon-btn-join:hover {
                    background: #1d4ed8;
                    transform: translateY(-2px);
                    box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
                }
                
                .tachyon-btn-later {
                    background: var(--badge-bg, #e2e8f0);
                    color: var(--text-primary, #0f172a);
                }
                
                .tachyon-btn-later:hover {
                    background: var(--time-bg, #eef2ff);
                    transform: translateY(-2px);
                }
                
                .tachyon-close {
                    position: absolute;
                    top: 1rem;
                    right: 1rem;
                    background: rgba(255, 255, 255, 0.2);
                    border: none;
                    color: white;
                    width: 32px;
                    height: 32px;
                    border-radius: 50%;
                    cursor: pointer;
                    font-size: 1.2rem;
                    transition: all 0.2s;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }
                
                .tachyon-close:hover {
                    background: rgba(255, 255, 255, 0.3);
                    transform: rotate(90deg);
                }
                
                @media (max-width: 480px) {
                    .tachyon-popup-header {
                        padding: 1.2rem;
                    }
                    .tachyon-popup-header i {
                        font-size: 2.5rem;
                    }
                    .tachyon-popup-header h2 {
                        font-size: 1.3rem;
                    }
                    .tachyon-popup-body {
                        padding: 1.2rem;
                    }
                    .tachyon-btn {
                        padding: 0.7rem;
                    }
                }
            `;
            document.head.appendChild(style);
        };
        
        const createPopupHTML = () => {
            const overlay = document.createElement('div');
            overlay.className = 'tachyon-popup-overlay';
            overlay.id = 'tachyonAutoJoinPopup';
            overlay.innerHTML = `
                <div class="tachyon-popup-card">
                    <button class="tachyon-close" id="tachyonClosePopup">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="tachyon-popup-header">
                        <i class="fas fa-video"></i>
                        <h2>Live Class Detected!</h2>
                        <p>Your ${new Date().toLocaleDateString('en-US', { weekday: 'long' })} class is in progress</p>
                    </div>
                    <div class="tachyon-popup-body">
                        <div class="class-details" id="popupClassDetails"></div>
                        <div class="tachyon-popup-buttons">
                            <button class="tachyon-btn tachyon-btn-join" id="tachyonJoinNow">
                                <i class="fas fa-door-open"></i> Join Now
                            </button>
                            <button class="tachyon-btn tachyon-btn-later" id="tachyonLater">
                                <i class="fas fa-clock"></i> Later
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            return overlay;
        };
        
        const formatTimeRange = (startMinutes, endMinutes) => {
            const formatTime = (minutes) => {
                const h = Math.floor(minutes / 60);
                const m = minutes % 60;
                const ampm = h >= 12 ? 'PM' : 'AM';
                let hour12 = h % 12;
                if (hour12 === 0) hour12 = 12;
                return `${hour12}:${m.toString().padStart(2, '0')} ${ampm}`;
            };
            return `${formatTime(startMinutes)} - ${formatTime(endMinutes)}`;
        };
        
        const showPopup = (activeClass) => {
            if (popupShown || !activeClass || !activeClass.zoom) {
                return;
            }
            
            popupShown = true;
            
            let popup = document.getElementById('tachyonAutoJoinPopup');
            if (!popup) {
                popup = createPopupHTML();
            }
            
            const detailsContainer = document.getElementById('popupClassDetails');
            if (detailsContainer && activeClass) {
                const timeRange = formatTimeRange(activeClass.start, activeClass.end);
                detailsContainer.innerHTML = `
                    <div class="detail-row">
                        <div class="detail-icon"><i class="fas fa-chalkboard-user"></i></div>
                        <div class="detail-content">
                            <div class="detail-label">SUBJECT</div>
                            <div class="detail-value">
                                ${activeClass.subject}
                                <span class="live-badge"><i class="fas fa-circle"></i> LIVE</span>
                            </div>
                        </div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-icon"><i class="fas fa-user-graduate"></i></div>
                        <div class="detail-content">
                            <div class="detail-label">TEACHER</div>
                            <div class="detail-value">${activeClass.teacher || 'Faculty'}</div>
                        </div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-icon"><i class="far fa-clock"></i></div>
                        <div class="detail-content">
                            <div class="detail-label">TIME</div>
                            <div class="detail-value">${timeRange}</div>
                        </div>
                    </div>
                    ${activeClass.zoom ? `
                    <div class="detail-row">
                        <div class="detail-icon"><i class="fas fa-key"></i></div>
                        <div class="detail-content">
                            <div class="detail-label">MEETING ID</div>
                            <div class="detail-value">${activeClass.zoom.id || 'Available'}</div>
                        </div>
                    </div>
                    ` : ''}
                `;
            }
            
            setTimeout(() => {
                popup.classList.add('active');
            }, 100);
            
            const joinBtn = document.getElementById('tachyonJoinNow');
            const laterBtn = document.getElementById('tachyonLater');
            const closeBtn = document.getElementById('tachyonClosePopup');
            
            const closePopup = () => {
                popup.classList.remove('active');
            };
            
            if (joinBtn) {
                const newJoinBtn = joinBtn.cloneNode(true);
                joinBtn.parentNode.replaceChild(newJoinBtn, joinBtn);
                newJoinBtn.addEventListener('click', () => {
                    if (activeClass && activeClass.zoom && activeClass.zoom.url) {
                        window.open(activeClass.zoom.url, '_blank');
                    }
                    closePopup();
                });
            }
            
            if (laterBtn) {
                const newLaterBtn = laterBtn.cloneNode(true);
                laterBtn.parentNode.replaceChild(newLaterBtn, laterBtn);
                newLaterBtn.addEventListener('click', closePopup);
            }
            
            if (closeBtn) {
                const newCloseBtn = closeBtn.cloneNode(true);
                closeBtn.parentNode.replaceChild(newCloseBtn, closeBtn);
                newCloseBtn.addEventListener('click', closePopup);
            }
            
            popup.addEventListener('click', (e) => {
                if (e.target === popup) {
                    closePopup();
                }
            });
        };
        
        const initAutoRejoin = () => {
            const checkForActiveClass = () => {
                if (typeof getCurrentActiveClass === 'function') {
                    const activeClass = getCurrentActiveClass();
                    
                    if (activeClass && activeClass.zoom && activeClass.zoom.url) {
                        console.log('[TACHYON] Active class detected:', activeClass.subject);
                        showPopup(activeClass);
                    } else if (activeClass && !activeClass.zoom) {
                        console.log('[TACHYON] Active class detected but no Zoom link available');
                    } else {
                        console.log('[TACHYON] No active class at this time');
                    }
                } else {
                    console.warn('[TACHYON] getCurrentActiveClass function not found. Retrying...');
                    setTimeout(checkForActiveClass, 500);
                }
            };
            
            setTimeout(checkForActiveClass, 1500);
        };
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                injectPopupStyles();
                initAutoRejoin();
            });
        } else {
            injectPopupStyles();
            initAutoRejoin();
        }
    })();
</script>

</html>
